<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QuestBoard Friends</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/friends.css">
<link id="theme-style" rel="stylesheet" href="css/theme/default.css">

<script src="https://unpkg.com/lucide@latest"></script>
<script src="js/theme.js"></script>
<script defer src="js/friends.js"></script>
<script defer src="js/ui.js"></script>

</head>

<body>

<div class="dashboard">

<!-- SIDEBAR -->

<div class="sidebar">

<h2 class="logo">
<i data-lucide="swords"></i> QuestBoard
</h2>

<ul>

<li>
<i data-lucide="layout-dashboard"></i>
<a href="dashboard.html">Dashboard</a>
</li>

<li>
<i data-lucide="user"></i>
<a href="profile.html">Profile</a>
</li>

<li>
<i data-lucide="users"></i>
<a href="friends.html">Friends</a>
</li>

<li onclick="logout()" class="logout">
<i data-lucide="log-out"></i>
Logout
</li>

</ul>

</div>


<!-- MAIN -->

<div class="main">

<!-- NAVBAR -->

<div class="navbar">

<div class="nav-left">
<i data-lucide="users"></i>
<span>Friends</span>
</div>

</div>


<div class="friends-container">

<!-- SEARCH PLAYERS -->

<div class="friends-card">

<h3>Find Players</h3>

<div class="search-box">

<input
id="playerSearch"
placeholder="Search players..."
oninput="searchPlayers()"
>

</div>

<div id="searchResults"></div>

</div>

<!-- FRIEND REQUESTS -->

<div class="friends-card">

<h3>Friend Requests</h3>

<div id="requests"></div>

</div>


<!-- FRIEND LIST -->

<div class="friends-card">

<h3>Your Friends</h3>

<div id="friendsList"></div>

</div>

<div class="friends-card">

<h3>
<i data-lucide="trophy"></i>
Friends Leaderboard
</h3>

<div id="leaderboard"></div>

</div>
</div>

</div>

</div>

<script>
lucide.createIcons()
</script>

</body>
</html>
